<!DOCTYPE html>
<html>
<head>
    <title>Amazon Clone</title>
    <link rel="stylesheet" href="ama.css">
</head>
<body>

<nav class="navbar">
<div class="logo">
    <span class="amazon">amazon</span><span class="india">.in</span>
</div>
    <input type="text" placeholder="Search Amazon">

    <div class="buttons">
        <button class="signin">Sign In</button>
        <button class="cart">Cart</button>
    </div>
</nav>

<div class="menu">
    <a href="#">Home</a>
    <a href="#">Electronics</a>
    <a href="#">Mobiles</a>
    <a href="#">Fashion</a>
    <a href="#">Books</a>
    <a href="#">Sports</a>
</div>

<div class="hero">
    <h1>Welcome to Amazon</h1>
    <p>Shop millions of products at amazing prices</p>
</div>

<div class="products">

    <div class="card">
        <img src="headphone.jpeg">
        <h3>Wireless Headphones</h3>
        <p>₹1,999</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="laptop.jpeg">
        <h3>Laptop</h3>
        <p>₹40,000</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="mac.jpeg">
        <h3>MacBook</h3>
        <p>₹1,00,000</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="pendrive.jpeg">
        <h3>Pendrive</h3>
        <p>₹500</p>
        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
