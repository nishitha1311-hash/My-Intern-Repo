<!DOCTYPE html>
<html>
<head>
    <title>ARU SUVAI RESTAURANT</title>
    <link rel="stylesheet" href="restaurant.css">
</head>
<body>

    <h1>ARU SUVAI RESTAURANT</h1>
    <h2>Our Special Menu</h2>

    <div class="container">

        <div class="card">
            <img src="chickengravy.jpeg" alt="Chicken Gravy">
            <h3>Chicken Gravy</h3>
            <p class="desc">Spicy and delicious chicken gravy.</p>
            <span class="price">Rs.180</span>
            <button>Order Now</button>
        </div>

        <div class="card">
            <img src="prawn.jpeg" alt="Prawn Gravy">
            <h3>Prawn Gravy</h3>
            <p class="desc">Fresh prawns cooked with rich spices.</p>
            <span class="price">Rs.200</span>
            <button>Order Now</button>
        </div>

        <div class="card">
            <img src="biriyani.jpeg" alt="Biriyani">
            <h3>Chicken Biriyani</h3>
            <p class="desc">Aromatic basmati rice with chicken.</p>
            <span class="price">Rs.100</span>
            <button>Order Now</button>
        </div>

    </div>

</body>
</html>
